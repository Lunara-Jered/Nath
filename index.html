<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Galerie de Nath</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #000; overflow-x: hidden; }
        
        .appbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(220,38,38,.3);
        }
        .appbar-title { color: #dc2626; font-size: 1.4rem; font-weight: 700; }
        .appbar-actions { display: flex; gap: 12px; align-items: center; }
        .btn {
            background: transparent;
            border: 1px solid #dc2626;
            color: #dc2626;
            padding: 7px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all .3s;
        }
        .btn:hover { background: #dc2626; color: #000; transform: translateY(-2px); }
        .stats {
            color: #fff;
            font-size: 13px;
            background: rgba(220,38,38,.15);
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid rgba(220,38,38,.3);
        }
        #syncStatus {
            font-size: 12px;
            padding: 5px 10px;
            border-radius: 20px;
            background: #88888811;
            color: #888;
        }
        
        .gallery {
            margin-top: 70px;
            padding: 16px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 3px;
            background: #000;
        }
        .gallery-item {
            position: relative;
            aspect-ratio: 1;
            overflow: hidden;
            cursor: pointer;
            background: #111;
        }
        .gallery-item img, .gallery-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .gallery-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,.85), transparent);
            padding: 28px 12px 10px;
            opacity: 0;
            transition: opacity .3s;
        }
        .gallery-item:hover .gallery-overlay { opacity: 1; }
        .gallery-name { color: #fff; font-size: 12px; }
        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,.7);
            border: 1px solid #dc2626;
            width: 30px;
            height: 30px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            color: #dc2626;
        }
        .gallery-item:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { background: #dc2626; color: #000; }
        
        .upload-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(20px);
        }
        .upload-overlay.active { display: flex; }
        .upload-area {
            background: #111;
            border: 2px dashed #dc2626;
            border-radius: 16px;
            padding: 50px 36px;
            text-align: center;
            max-width: 480px;
            width: 90%;
            cursor: pointer;
        }
        .upload-area:hover { border-color: #f87171; background: #1a0000; }
        .upload-icon { font-size: 48px; margin-bottom: 16px; color: #dc2626; }
        .upload-text { color: #fff; font-size: 16px; margin-bottom: 8px; }
        .upload-subtext { color: #555; font-size: 12px; }
        
        .fullscreen-modal {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 1000;
            display: none;
        }
        .fullscreen-modal.active { display: block; }
        .modal-stage {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-media {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .close-modal {
            position: fixed;
            top: 16px;
            right: 16px;
            background: rgba(0,0,0,.7);
            border: 1px solid #dc2626;
            color: #dc2626;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 26px;
            z-index: 1002;
        }
        .modal-info {
            position: fixed;
            bottom: 18px;
            left: 18px;
            right: 18px;
            background: rgba(0,0,0,.8);
            backdrop-filter: blur(10px);
            padding: 10px 18px;
            border-radius: 12px;
            border-left: 3px solid #dc2626;
            z-index: 1002;
            color: #fff;
        }
        .empty-state {
            grid-column: 1/-1;
            text-align: center;
            padding: 80px 20px;
            color: #888;
        }
        #uploadProgress {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            height: 3px;
            background: #111;
            z-index: 98;
            display: none;
        }
        #uploadProgressBar {
            height: 100%;
            background: #dc2626;
            transition: width .3s ease;
            width: 0%;
        }
        @media (max-width: 640px) {
            .gallery { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
        }
    </style>
</head>
<body>

<div class="appbar">
    <div class="appbar-title">JOYEUX ANNIVERSAIRE</div>
    <div class="appbar-actions">
        <span class="stats" id="stats">0 fichier</span>
        <span id="syncStatus">📡 Mode local</span>
        <button class="btn" id="uploadBtn">IMPORTER</button>
    </div>
</div>

<div id="uploadProgress"><div id="uploadProgressBar"></div></div>
<div class="gallery" id="gallery"></div>

<div class="upload-overlay" id="uploadOverlay">
    <div class="upload-area" id="uploadArea">
        <div class="upload-icon">⬆️</div>
        <div class="upload-text">Cliquez pour sélectionner des fichiers</div>
        <div class="upload-subtext">Glissez-déposez ou cliquez pour importer</div>
        <div class="upload-subtext" style="margin-top: 12px; color: #dc2626;">Images et vidéos uniquement</div>
    </div>
</div>

<input type="file" id="fileInput" multiple accept="image/*,video/*" style="display:none">

<div class="fullscreen-modal" id="fullscreenModal">
    <div class="close-modal" id="closeModal">×</div>
    <div class="modal-stage" id="modalStage">
        <img class="modal-media" id="modalImage" style="display: none;">
        <video class="modal-media" id="modalVideo" controls style="display: none;"></video>
    </div>
    <div class="modal-info" id="modalInfo">
        <div id="infoName"></div>
        <div id="infoMeta" style="font-size: 12px; color: #dc2626;"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ═══════════════════════════════════════════════════════════
// CONFIGURATION SUPABASE
// ═══════════════════════════════════════════════════════════
const SUPABASE_URL = 'https://gvnvnoisofvalibuqzun.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd2bnZub2lzb2Z2YWxpYnVxenVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwODQ0OTgsImV4cCI6MjA5MDY2MDQ5OH0.8Dg2kIy8Qwk09T2l9XeiBdvUdgv8cVNb2oXBJLMsf38';
const BUCKET = 'gallery';
const TABLE = 'gallery_files';

let supabase = null;
let files = [];
let currentIndex = 0;
let useSupabase = false; // Par défaut on utilise le mode local

// ═══════════════════════════════════════════════════════════
// IMAGES DE DÉMO
// ═══════════════════════════════════════════════════════════
const demoImages = [
    'https://picsum.photos/id/104/800/600',
    'https://picsum.photos/id/106/800/600',
    'https://picsum.photos/id/107/800/600',
    'https://picsum.photos/id/108/800/600',
    'https://picsum.photos/id/116/800/600',
    'https://picsum.photos/id/119/800/600'
];

function initDemo() {
    files = [];
    demoImages.forEach((url, index) => {
        files.push({
            id: 'demo-' + index,
            name: 'Photo ' + (index + 1) + '.jpg',
            size: 0,
            type: 'image/jpeg',
            fileType: 'image',
            url: url,
            date: new Date().toISOString()
        });
    });
    renderGallery();
    updateStatus('📡 Mode démo', '#888');
}

// ═══════════════════════════════════════════════════════════
// CONNEXION SUPABASE
// ═══════════════════════════════════════════════════════════
async function initSupabase() {
    try {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        // Test de connexion
        const { data, error } = await supabase.from(TABLE).select('count', { count: 'exact', head: true });
        if (error) throw error;
        useSupabase = true;
        updateStatus('☁️ Cloud connecté', '#22c55e');
        await loadFromSupabase();
    } catch(e) {
        console.warn('Supabase non disponible:', e.message);
        updateStatus('📡 Mode local', '#f59e0b');
        initDemo();
    }
}

async function loadFromSupabase() {
    if (!supabase) return;
    try {
        const { data, error } = await supabase
            .from(TABLE)
            .select('*')
            .order('created_at', { ascending: false });
        
        if (error) throw error;
        
        if (data && data.length > 0) {
            files = data.map(row => ({
                id: row.id,
                name: row.name,
                size: row.size,
                type: row.mime_type,
                fileType: row.file_type,
                url: row.url,
                date: row.created_at
            }));
            renderGallery();
            updateStatus(`☁️ ${files.length} fichier(s)`, '#22c55e');
        } else {
            initDemo();
        }
    } catch(e) {
        console.error('Erreur chargement:', e);
        initDemo();
    }
}

function updateStatus(msg, color) {
    const el = document.getElementById('syncStatus');
    if (el) {
        el.textContent = msg;
        el.style.color = color;
        el.style.border = `1px solid ${color}44`;
        el.style.background = `${color}18`;
    }
}

// ═══════════════════════════════════════════════════════════
// UPLOAD VERS SUPABASE
// ═══════════════════════════════════════════════════════════
async function uploadToSupabase(file, fileType, previewUrl) {
    if (!useSupabase) return null;
    
    try {
        const ext = file.name.split('.').pop();
        const path = `${Date.now()}_${Math.random().toString(36).substr(2, 6)}.${ext}`;
        
        // Upload vers Storage
        const { error: uploadError } = await supabase.storage
            .from(BUCKET)
            .upload(path, file, { upsert: false });
        
        if (uploadError) throw uploadError;
        
        // Récupérer l'URL publique
        const { data: urlData } = supabase.storage.from(BUCKET).getPublicUrl(path);
        
        // Sauvegarder en BDD
        const { data: row, error: dbError } = await supabase
            .from(TABLE)
            .insert({
                name: file.name,
                size: file.size,
                mime_type: file.type,
                file_type: fileType,
                url: urlData.publicUrl,
                storage_path: path
            })
            .select()
            .single();
        
        if (dbError) throw dbError;
        
        return {
            id: row.id,
            name: row.name,
            size: row.size,
            type: row.mime_type,
            fileType: row.file_type,
            url: row.url,
            date: row.created_at
        };
    } catch(e) {
        console.error('Upload error:', e);
        return null;
    }
}

// ═══════════════════════════════════════════════════════════
// GESTION DES FICHIERS
// ═══════════════════════════════════════════════════════════
function formatSize(bytes) {
    if (!bytes || bytes === 0) return '—';
    const k = 1024;
    const sizes = ['B', 'KB', 'MB', 'GB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
}

function readFileAsDataURL(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
    });
}

async function addFiles(newFiles) {
    // Fermer l'overlay
    document.getElementById('uploadOverlay').classList.remove('active');
    
    const prog = document.getElementById('uploadProgress');
    const progBar = document.getElementById('uploadProgressBar');
    prog.style.display = 'block';
    
    for (let i = 0; i < newFiles.length; i++) {
        const file = newFiles[i];
        const fileType = file.type.startsWith('image/') ? 'image' : 
                        file.type.startsWith('video/') ? 'video' : 'document';
        
        progBar.style.width = Math.round((i / newFiles.length) * 90) + '%';
        
        let fileObj = null;
        
        // Tentative d'upload vers Supabase
        if (useSupabase) {
            updateStatus('⏫ Upload...', '#f59e0b');
            const uploaded = await uploadToSupabase(file, fileType);
            if (uploaded) {
                fileObj = uploaded;
                updateStatus('☁️ Synchronisé', '#22c55e');
            }
        }
        
        // Fallback local si Supabase échoue ou en mode local
        if (!fileObj) {
            const url = await readFileAsDataURL(file);
            fileObj = {
                id: Date.now() + '-' + Math.random(),
                name: file.name,
                size: file.size,
                type: file.type,
                fileType: fileType,
                url: url,
                date: new Date().toISOString()
            };
            updateStatus('📡 Mode local', '#f59e0b');
        }
        
        files.unshift(fileObj);
        renderGallery();
    }
    
    progBar.style.width = '100%';
    setTimeout(() => {
        prog.style.display = 'none';
        progBar.style.width = '0%';
    }, 600);
}

async function deleteFile(id, event) {
    if (event) event.stopPropagation();
    if (!confirm('Supprimer ce fichier ?')) return;
    
    const file = files.find(f => f.id === id);
    
    // Suppression dans Supabase si c'est un fichier cloud
    if (useSupabase && file && !String(id).startsWith('demo')) {
        updateStatus('⏫ Suppression...', '#f59e0b');
        try {
            // Récupérer le path depuis l'URL
            if (file.url) {
                const path = file.url.split('/').pop();
                await supabase.storage.from(BUCKET).remove([path]);
            }
            await supabase.from(TABLE).delete().eq('id', id);
            updateStatus('☁️ Synchronisé', '#22c55e');
        } catch(e) {
            console.warn(e);
        }
    }
    
    files = files.filter(f => f.id !== id);
    renderGallery();
    
    if (document.getElementById('fullscreenModal').classList.contains('active')) {
        if (files.length === 0) {
            closeModal();
        } else {
            openModal(Math.min(currentIndex, files.length - 1));
        }
    }
}

// ═══════════════════════════════════════════════════════════
// GALERIE
// ═══════════════════════════════════════════════════════════
function renderGallery() {
    const gallery = document.getElementById('gallery');
    const stats = document.getElementById('stats');
    
    stats.textContent = `${files.length} fichier${files.length !== 1 ? 's' : ''}`;
    
    if (files.length === 0) {
        gallery.innerHTML = `<div class="empty-state"><div style="font-size:64px;margin-bottom:20px;color:#dc2626">📷</div><p style="font-size:18px;color:#ccc">La galerie est vide</p><p>Clique sur <strong style="color:#dc2626">IMPORTER</strong> pour ajouter des photos</p></div>`;
        return;
    }
    
    gallery.innerHTML = files.map((file, idx) => `
        <div class="gallery-item" onclick="openModal(${idx})">
            ${file.fileType === 'image' ? 
                `<img src="${file.url}" alt="${file.name}" loading="lazy">` : 
                `<video src="${file.url}" muted playsinline></video>`
            }
            <div class="gallery-overlay">
                <div class="gallery-name">${file.name.length > 38 ? file.name.slice(0,35)+'…' : file.name}</div>
            </div>
            <div class="delete-btn" onclick="deleteFile('${file.id}', event)">✕</div>
        </div>
    `).join('');
}

// ═══════════════════════════════════════════════════════════
// MODAL FULLSCREEN
// ═══════════════════════════════════════════════════════════
function openModal(index) {
    currentIndex = index;
    const modal = document.getElementById('fullscreenModal');
    const modalImg = document.getElementById('modalImage');
    const modalVideo = document.getElementById('modalVideo');
    const file = files[currentIndex];
    
    modalImg.style.display = 'none';
    modalVideo.style.display = 'none';
    
    if (file.fileType === 'image') {
        modalImg.src = file.url;
        modalImg.style.display = 'block';
    } else if (file.fileType === 'video') {
        modalVideo.src = file.url;
        modalVideo.style.display = 'block';
        modalVideo.load();
        modalVideo.play();
    }
    
    document.getElementById('infoName').textContent = file.name;
    document.getElementById('infoMeta').textContent = `${file.fileType.toUpperCase()} • ${formatSize(file.size)}`;
    
    modal.classList.add('active');
}

function closeModal() {
    const modal = document.getElementById('fullscreenModal');
    const modalVideo = document.getElementById('modalVideo');
    modalVideo.pause();
    modalVideo.src = '';
    modal.classList.remove('active');
}

function nextImage() {
    if (currentIndex < files.length - 1) openModal(currentIndex + 1);
}

function prevImage() {
    if (currentIndex > 0) openModal(currentIndex - 1);
}

// ═══════════════════════════════════════════════════════════
// UPLOAD UI
// ═══════════════════════════════════════════════════════════
function setupUpload() {
    const uploadBtn = document.getElementById('uploadBtn');
    const uploadOverlay = document.getElementById('uploadOverlay');
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    
    uploadBtn.onclick = (e) => {
        e.preventDefault();
        e.stopPropagation();
        uploadOverlay.classList.add('active');
    };
    
    uploadOverlay.onclick = (e) => {
        if (e.target === uploadOverlay) uploadOverlay.classList.remove('active');
    };
    
    uploadArea.onclick = (e) => {
        e.stopPropagation();
        fileInput.click();
    };
    
    fileInput.onchange = (e) => {
        if (e.target.files.length > 0) {
            addFiles(Array.from(e.target.files));
            fileInput.value = '';
        }
    };
    
    uploadArea.ondragover = (e) => {
        e.preventDefault();
        uploadArea.classList.add('drag-over');
    };
    
    uploadArea.ondragleave = () => {
        uploadArea.classList.remove('drag-over');
    };
    
    uploadArea.ondrop = (e) => {
        e.preventDefault();
        uploadArea.classList.remove('drag-over');
        addFiles(Array.from(e.dataTransfer.files));
    };
}

function setupModalControls() {
    document.getElementById('closeModal').onclick = closeModal;
    
    document.addEventListener('keydown', (e) => {
        if (document.getElementById('fullscreenModal').classList.contains('active')) {
            if (e.key === 'ArrowLeft') prevImage();
            if (e.key === 'ArrowRight') nextImage();
            if (e.key === 'Escape') closeModal();
        }
    });
}

function setupSwipe() {
    let touchStartX = 0;
    const modal = document.getElementById('fullscreenModal');
    
    modal.addEventListener('touchstart', (e) => {
        touchStartX = e.changedTouches[0].screenX;
    });
    
    modal.addEventListener('touchend', (e) => {
        const deltaX = e.changedTouches[0].screenX - touchStartX;
        if (Math.abs(deltaX) > 50) {
            if (deltaX > 0) prevImage();
            else nextImage();
        }
    });
}

// ═══════════════════════════════════════════════════════════
// INITIALISATION
// ═══════════════════════════════════════════════════════════
async function init() {
    setupUpload();
    setupModalControls();
    setupSwipe();
    
    // Tentative de connexion Supabase (non bloquante)
    await initSupabase();
}

init();

// Exposer les fonctions globales
window.openModal = openModal;
window.deleteFile = deleteFile;
window.prevImage = prevImage;
window.nextImage = nextImage;
window.closeModal = closeModal;
</script>
</body>
</html>
